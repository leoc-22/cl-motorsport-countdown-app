name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: Development
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.3"

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build web app
        working-directory: web
        run: bun run build

      - name: Deploy preview to Cloudflare Pages
        working-directory: web
        run: |
          bunx wrangler pages deploy dist \
            --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" \
            --branch "pr-${{ github.event.pull_request.number }}"

  build-production-worker:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure manual deploy runs on main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "Manual deploy is only allowed from the main branch."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.3"

      - name: Install worker dependencies
        working-directory: worker
        run: bun install --frozen-lockfile

      - name: Build Worker
        working-directory: worker
        run: bunx wrangler deploy --dry-run --outdir dist

      - name: Upload Worker artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-worker
          path: worker/dist
          if-no-files-found: error
          retention-days: 1

  build-production-web:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL_PRODUCTION }}
    steps:
      - name: Ensure manual deploy runs on main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "Manual deploy is only allowed from the main branch."
          exit 1

      - name: Ensure production API URL is configured
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "Repository variable VITE_API_URL_PRODUCTION is required."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.3"

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build web app
        working-directory: web
        run: bun run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-web
          path: web/dist
          if-no-files-found: error
          retention-days: 1

  deploy-production:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs:
      - build-production-worker
      - build-production-web
    runs-on: ubuntu-latest
    environment: Production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.3"

      - name: Install worker dependencies
        working-directory: worker
        run: bun install --frozen-lockfile

      - name: Download Worker artifact
        uses: actions/download-artifact@v5
        with:
          name: production-worker
          path: worker/dist

      - name: Download web artifact
        uses: actions/download-artifact@v5
        with:
          name: production-web
          path: web/dist

      - name: Deploy Worker to production
        working-directory: worker
        run: bunx wrangler deploy dist/index.js --no-bundle

      - name: Deploy web to production (Cloudflare Pages)
        working-directory: worker
        run: |
          bunx wrangler pages deploy ../web/dist \
            --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" \
            --branch "main"
